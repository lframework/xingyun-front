<!DOCTYPE html>
<html lang="zh-CN" id="htmlRoot">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="renderer" content="webkit" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=0"
    />
    <title><%= VITE_GLOB_APP_TITLE %></title>
    <link rel="icon" href="<%= VITE_PUBLIC_PATH %>favicon.ico" />
  </head>
  <body>
    <div id="app">
      <style>
        html,
        body,
        #app {
          width: 100%;
          height: 100%;
          margin: 0;
        }

        html[data-theme='dark'] .app-loading {
          background:
            radial-gradient(circle at top left, rgb(59 130 246 / 18%), transparent 28%),
            linear-gradient(180deg, #0f1727 0%, #111d31 100%);
        }

        html[data-theme='dark'] .app-loading::before {
          background: radial-gradient(circle, rgb(56 189 248 / 16%) 0%, transparent 72%);
        }

        html[data-theme='dark'] .app-loading::after {
          background: radial-gradient(circle, rgb(37 99 235 / 14%) 0%, transparent 75%);
        }

        html[data-theme='dark'] .app-loading .app-loading-panel {
          border-color: rgb(148 163 184 / 14%);
          background: rgb(10 19 32 / 68%);
          box-shadow: 0 28px 70px rgb(0 0 0 / 28%);
        }

        html[data-theme='dark'] .app-loading .app-loading-badge {
          background: rgb(30 41 59 / 82%);
          color: #bfdbfe;
        }

        html[data-theme='dark'] .app-loading .app-loading-title {
          color: rgb(255 255 255 / 92%);
        }

        html[data-theme='dark'] .app-loading .app-loading-desc {
          color: rgb(191 219 254 / 72%);
        }

        html[data-theme='dark'] .app-loading .app-loading-bar {
          background: rgb(15 23 42 / 88%);
        }

        .app-loading {
          position: relative;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          width: 100%;
          height: 100%;
          overflow: hidden;
          background:
            radial-gradient(circle at top right, rgb(96 165 250 / 14%), transparent 26%),
            linear-gradient(180deg, #f7faff 0%, #eef4fb 100%);
        }

        .app-loading::before,
        .app-loading::after {
          content: '';
          position: absolute;
          border-radius: 999px;
          pointer-events: none;
        }

        .app-loading::before {
          top: 12%;
          right: 12%;
          width: 280px;
          height: 280px;
          background: radial-gradient(circle, rgb(125 211 252 / 24%) 0%, transparent 72%);
        }

        .app-loading::after {
          left: 10%;
          bottom: 12%;
          width: 220px;
          height: 220px;
          background: radial-gradient(circle, rgb(59 130 246 / 10%) 0%, transparent 75%);
        }

        .app-loading .app-loading-wrap {
          display: flex;
          position: absolute;
          top: 50%;
          left: 50%;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          transform: translate3d(-50%, -50%, 0);
          z-index: 1;
        }

        .app-loading .app-loading-panel {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-width: 360px;
          padding: 34px 40px 30px;
          border: 1px solid rgb(148 163 184 / 16%);
          border-radius: 30px;
          background: rgb(255 255 255 / 70%);
          box-shadow: 0 28px 70px rgb(15 23 42 / 10%);
          backdrop-filter: blur(18px);
        }

        .app-loading .app-loading-badge {
          display: inline-flex;
          align-items: center;
          padding: 7px 12px;
          border-radius: 999px;
          background: rgb(224 242 254 / 90%);
          color: #0369a1;
          font-size: 11px;
          font-weight: 700;
          letter-spacing: 0.12em;
          text-transform: uppercase;
        }

        .app-loading .app-loading-title {
          display: flex;
          align-items: center;
          justify-content: center;
          margin-top: 18px;
          color: #0f172a;
          font-size: 30px;
          font-weight: 700;
          line-height: 1.2;
        }

        .app-loading .app-loading-desc {
          margin-top: 10px;
          color: #64748b;
          font-size: 14px;
          line-height: 1.7;
        }

        .app-loading .app-loading-logo {
          display: block;
          width: 82px;
          margin: 0 auto;
          margin-top: 22px;
        }

        .app-loading .app-loading-bar {
          position: relative;
          width: 220px;
          height: 8px;
          margin-top: 24px;
          overflow: hidden;
          border-radius: 999px;
          background: rgb(226 232 240 / 88%);
        }

        .app-loading .app-loading-bar::before {
          content: '';
          display: block;
          position: absolute;
          left: 0;
          top: 0;
          width: 40%;
          height: 100%;
          border-radius: inherit;
          background: linear-gradient(90deg, #2563eb 0%, #38bdf8 100%);
          animation: app-loading-slide 1.45s ease-in-out infinite;
        }

        @keyframes app-loading-slide {
          0% {
            transform: translateX(-110%);
          }
          55% {
            transform: translateX(170%);
          }
          to {
            transform: translateX(170%);
          }
        }
      </style>
      <div class="app-loading">
        <div class="app-loading-wrap">
          <div class="app-loading-panel">
            <span class="app-loading-badge">工作台加载中</span>
            <img src="<%= VITE_PUBLIC_PATH %>logo.png" class="app-loading-logo" alt="Logo" />
            <div class="app-loading-title"><%= VITE_GLOB_APP_TITLE %></div>
            <div class="app-loading-desc">正在初始化工作台</div>
            <div class="app-loading-bar"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
